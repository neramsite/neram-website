<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDUCATION FOR DIGITAL ASSETS</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@500;700&family=Oxanium:wght@600;800&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:#06070d; color:#e2eafc; font-family:'Oxanium',sans-serif; overflow-x:hidden; min-height:100vh; }
body::before{ content:''; position:fixed; top:0; left:0; width:100%; height:100%; background: linear-gradient(rgba(0,242,254,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(0,242,254,0.015) 1px, transparent 1px); background-size:30px 30px; z-index:-2; }
body::after{ content:''; position:fixed; top:20%; right:-10%; width:600px; height:600px; background: radial-gradient(circle, rgba(0,242,254,0.06) 0%, transparent 65%); z-index:-1; }
/* NAVBAR */
.top-navbar{ width:100%; padding:20px 50px; display:flex; justify-content:space-between; align-items:center; background:#090b14; border-bottom:3px solid #00f2fe; position:fixed; top:0; left:0; z-index:99999; box-shadow: 0 4px 30px rgba(0,242,254,0.25); }
.logo{ position:relative; padding:14px 35px; font-size:32px; font-weight:900; letter-spacing:5px; text-transform:uppercase; border-radius:18px; overflow:hidden; background: linear-gradient(135deg, rgba(0,242,254,0.12), rgba(255,255,255,0.03)); border:1px solid rgba(0,242,254,0.5); box-shadow: 0 0 15px rgba(0,242,254,0.5), 0 0 50px rgba(0,242,254,0.15); backdrop-filter:blur(12px); animation:floatLogo 3s ease-in-out infinite; white-space: nowrap; }
.logo span{ background: linear-gradient(90deg, #00f2fe, #ffffff, #5ce1ff, #00f2fe); background-size:300%; -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:textMove 5s linear infinite; }
@keyframes rotateGlow{ 100%{ transform:rotate(360deg); } }
@keyframes textMove{ 0%{ background-position:0%; } 100%{ background-position:300%; } }
@keyframes floatLogo{ 0%{ transform:translateY(0px); } 50%{ transform:translateY(-3px); } 100%{ transform:translateY(0px); } }
/* NAV BUTTONS */
.nav-buttons{ display:flex; gap:12px; }
.nav-buttons button{ font-family:'Oxanium',sans-serif; padding:12px 28px; border:1px solid #00f2fe; background:transparent; color:#00f2fe; font-size:15px; font-weight:700; letter-spacing:1px; cursor:pointer; clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%); transition:0.3s; }
.nav-buttons button:hover{ background:#00f2fe; color:#06070d; box-shadow: 0 0 20px rgba(0,242,254,0.5); transform:translateY(-2px); }
/* HERO */
.hero{ padding:150px 20px 0px; text-align:center; }
/* POSTER GRID */
.poster-grid{ max-width:1400px; margin:auto; padding:20px 18px 100px; display:grid; grid-template-columns: repeat(auto-fit,minmax(300px,1fr)); gap:32px; justify-content:center; }
/* POSTER CARD */
.poster-card{ background:#0e1122; border:2px solid #1a1f38; padding:18px; position:relative; display:flex; flex-direction:column; justify-content:space-between; clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px)); transition:0.4s; max-width:340px; margin:auto; }
.poster-card:hover{ transform: translateY(-4px) scale(1.01); border-color:#00f2fe; box-shadow: -4px 4px 0px #00f2fe, 0 15px 30px rgba(0,242,254,0.25); }
.image-container{ width:100%; height:450px; overflow:hidden; border:1px solid rgba(255,255,255,0.05); background:#06070d; border-radius:12px; position:relative; }
.poster-image{ width:100%; height:100%; object-fit:cover; object-position:center; display:block; transition:0.4s; }
.poster-card:hover .poster-image{ transform:scale(1.03); }
.poster-btn{ font-family:'Oxanium',sans-serif; width:100%; padding:14px; margin-top:16px; border:none; background: linear-gradient(135deg, #00f2fe 0%, #00a2ae 100%); color:#06070d; font-size:14px; font-weight:800; letter-spacing:2px; cursor:pointer; clip-path: polygon(0 0, 100% 0, calc(100% - 10px) 100%, 10px 100%); transition:0.3s; box-shadow: 0 0 15px rgba(0,242,254,0.35); }
.poster-btn:hover{ background: linear-gradient(135deg, #ffffff 0%, #e2eafc 100%); transform: translateY(-3px) scale(1.02); box-shadow: 0 0 25px rgba(255,255,255,0.5); }
/* POPUPS & ADMIN */
.popup-bg, .registration-popup{ position:fixed; top:0; left:0; width:100%; height:100%; display:none; justify-content:center; align-items:center; background: rgba(4,5,10,0.92); z-index:9999; padding:20px; }
.popup-box, .registration-box{ width:400px; padding:40px 30px; background:#0a0d1a; border:2px solid #00f2fe; text-align:center; box-shadow: 0 0 30px rgba(0,242,254,0.2); }
.popup-box h2, .registration-box h2{ font-size:22px; font-weight:800; margin-bottom:25px; color:#ffffff; letter-spacing:2px; }
.popup-box input, .popup-box select{ font-family:'Fira Code',monospace; width:100%; padding:14px; margin-bottom:16px; background:#12162b; border:1px solid #242b54; color:#00f2fe; font-size:14px; outline:none; }
.popup-box button, .registration-box button{ font-family:'Oxanium',sans-serif; width:100%; padding:14px; border:1px solid #00f2fe; background:transparent; color:#00f2fe; font-size:14px; font-weight:700; cursor:pointer; transition:0.3s; }
.popup-box button:hover, .registration-box button:hover{ background:#00f2fe; color:#06070d; }
.admin-page{ display:none; padding:180px 20px 100px; }
.admin-title{ text-align:center; font-size:42px; margin-bottom:50px; color:#00f2fe; letter-spacing:4px; }
.admin-grid{ max-width:1000px; margin:auto; display:grid; grid-template-columns: repeat(auto-fit,minmax(320px,1fr)); gap:35px; }
.admin-card{ background:#0e1122; border:2px solid #1a1f38; padding:40px 25px; clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px)); transition:0.4s; }
.admin-card:hover{ border-color:#00f2fe; box-shadow: 0 15px 30px rgba(0,242,254,0.25); transform:translateY(-5px); }
.admin-card button{ width:100%; padding:15px; border:none; background: linear-gradient(135deg, #00f2fe, #00a2ae); color:#06070d; font-size:15px; font-weight:800; letter-spacing:2px; cursor:pointer; }
</style>
</head>
<body>
<nav class="top-navbar">
  <div class="logo"><span>EDUCATION FOR DIGITAL ASSETS</span></div>
  <div class="nav-buttons">
    <button onclick="goHome()">HOME</button>
    <button onclick="openAdminPopup()">ADMIN TERMINAL</button>
    <button onclick="openLoginPopup()">LOGIN DATA</button>
  </div>
</nav>

<div id="mainPage">
  <section class="hero"></section>
  <section class="poster-grid">
    <!-- Buttons -->
    <div class="poster-card"><div class="image-container"><img src="https://i.postimg.cc/LX8jbmBf/Chat-GPT-Image-Jun-1-2026-03-19-56-PM.png" class="poster-image"></div><button class="poster-btn" onclick="openGoogleForm()">REGISTER</button></div>
    <div class="poster-card"><div class="image-container"><img src="https://i.postimg.cc/HsYsQzVK/Chat-GPT-Image-May-24-2026-06-40-07-AM.png" class="poster-image"></div><button class="poster-btn" onclick="openThirdGoogleForm()">REGISTER</button></div>
    <div class="poster-card"><div class="image-container"><img src="https://i.postimg.cc/XYdfZ6Rq/Chat-GPT-Image-Jun-9-2026-07-35-00-AM.png" class="poster-image"></div><button class="poster-btn" onclick="openNewRegistration()">REGISTER</button></div>
    
  </section>
</div>

<div id="adminPage" class="admin-page">
  <h1 class="admin-title">ADMIN CONTROL PANEL</h1>
  <div class="admin-grid">
    <div class="admin-card"><h2>TEAM DETAILS</h2><button onclick="openTeamDetails()">OPEN</button></div>
    <div class="admin-card"><h2>DAY TO ACTIVITIES</h2><button onclick="openActivities()">OPEN</button></div>
  </div>
</div>

<div id="adminPopup" class="popup-bg"><div class="popup-box"><h2>CRITICAL ADMIN GATE</h2><input type="password" id="adminPassword" placeholder="ENTER ACCESS DECK PIN"><button onclick="checkAdminPassword()">VERIFY GATEKEY</button></div></div>
<div id="loginPopup" class="popup-bg"><div class="popup-box"><h2>SECURITY ROUTER SYSTEM</h2><select id="loginLevel"><option value="">SELECT SEGMENT</option><option value="L4">LEVEL L-4</option><option value="L5">LEVEL L-5</option></select><input type="email" id="loginMail" placeholder="ROUTER MAIL LOGON"><input type="password" id="loginPassword" placeholder="CRYPTOGRAPHIC PHRASE"><button onclick="checkLoginData()">AUTHORIZE IDENTITY</button></div></div>
<div id="registrationPopup" class="registration-popup"><div class="registration-box"><h2>REGISTRATION STATUS</h2><p id="popupMessage">MESSAGE</p><button onclick="closeRegistrationPopup()">CLOSE</button></div></div>

<script>
function goHome(){ document.getElementById("mainPage").style.display = "block"; document.getElementById("adminPage").style.display = "none"; window.scrollTo({top:0, behavior:'smooth'}); }
function openGoogleForm(){ window.open("https://forms.gle/3cYXcAiHE8iK78xf6", "_blank"); }
function openThirdGoogleForm(){ window.open("https://forms.gle/ihDgYDRfcDCZ4WVN7", "_blank"); }
function openNewRegistration(){
  let now = new Date();
  let openDate = new Date("2026-06-06T20:00:00");
  let closeDate = new Date("2026-06-07T23:00:00");
  if(now < openDate){ showRegistrationPopup("REGISTRATION OPENS ON <br><br><b>06.06.2026 AT 08.00 PM</b>"); }
  else if(now > closeDate){ showRegistrationPopup("REGISTRATION CLOSED ON <br><br><b>07.06.2026 AT 11.00 PM</b>"); }
  else{ window.open("https://forms.gle/vbRr9DUCeeUkB2WT8", "_blank"); }
}
function openFourthRegistration(){ window.open("https://forms.gle/E41VRf96WjvRzKuc8", "_blank"); }
function showRegistrationPopup(message){ document.getElementById("registrationPopup").style.display = "flex"; document.getElementById("popupMessage").innerHTML = message; }
function closeRegistrationPopup(){ document.getElementById("registrationPopup").style.display = "none"; }
function openAdminPopup(){ document.getElementById("adminPopup").style.display = "flex"; }
function openLoginPopup(){ document.getElementById("loginPopup").style.display = "flex"; }
window.onclick = function(event){
  let ids = ["adminPopup", "loginPopup", "registrationPopup"];
  ids.forEach(id => { if(event.target == document.getElementById(id)){ document.getElementById(id).style.display = "none"; } });
}
function checkAdminPassword(){
  let pass = document.getElementById("adminPassword").value;
  if(pass === "kavi123"){ document.getElementById("adminPopup").style.display = "none"; document.getElementById("mainPage").style.display = "none"; document.getElementById("adminPage").style.display = "block"; window.scrollTo({top:0, behavior:'smooth'}); }
  else{ alert("INVALID PASSWORD"); }
}
function openTeamDetails(){ window.open("https://drive.google.com/", "_blank"); }
function openActivities(){ window.open("https://docs.google.com/", "_blank"); }
function checkLoginData(){
  let level = document.getElementById("loginLevel").value;
  let password = document.getElementById("loginPassword").value;
  if(level === "L4" && password === "hexa$777"){ window.location.href = "https://drive.google.com/drive/folders/1HYouDTJ_r708j-cpvbCRy6ZN5Xcxh-a3?usp=sharing"; }
  else if(level === "L5" && password === "krotos$7"){ window.location.href = "https://drive.google.com/drive/folders/1iHYvK3v3zVsMlEngk-alxY7P88dKniRG?usp=sharing"; }
  else{ alert("INVALID LOGIN"); }
}
</script>
</body>
</html>
